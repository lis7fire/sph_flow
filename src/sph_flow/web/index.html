<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>视频号流速监控系统</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">SPH FLOW MONITOR</p>
          <h1>视频号流速监控系统</h1>
          <p class="hero-copy">本地 Python 版，支持后台周期采集、周期增量汇总、折线图查看和 Excel 导出。</p>
        </div>
        <div class="hero-actions">
          <button id="capture-button" class="primary">开始采集</button>
          <button id="run-now-button" class="secondary">立即采集</button>
          <a id="export-button" class="secondary link-button" href="/api/export.xlsx">导出 Excel</a>
        </div>
      </header>

      <main class="grid">
        <section class="panel status-panel">
          <div class="panel-title-row">
            <h2>运行状态</h2>
            <button id="refresh-all-button" class="ghost">刷新</button>
          </div>
          <div class="status-list">
            <div>
              <span>当前账号</span>
              <strong id="account-label">-</strong>
            </div>
            <div>
              <span>上次运行</span>
              <strong id="last-run">-</strong>
            </div>
            <div>
              <span>上次成功</span>
              <strong id="last-success">-</strong>
            </div>
            <div>
              <span>采集范围</span>
              <strong id="capture-scope">-</strong>
            </div>
          </div>
          <div class="notice error" id="last-error">无</div>
        </section>

        <section class="panel settings-panel">
          <h2>采集设置</h2>
          <form id="settings-form">
            <div class="form-grid">
              <label>
                <span>采集间隔(分钟)</span>
                <input id="poll-interval" type="number" min="1" required />
              </label>
              <label>
                <span>默认汇总周期(分钟)</span>
                <input id="compare-window" type="number" min="1" required />
              </label>
              <label>
                <span>数据保留天数</span>
                <input id="retention-days" type="number" min="1" required />
              </label>
              <label>
                <span>请求超时(秒)</span>
                <input id="request-timeout" type="number" min="5" required />
              </label>
            </div>
            <label>
              <span>目标页面</span>
              <input id="target-url" type="url" required />
            </label>
            <label>
              <span>账号名称补充</span>
              <input id="account-label-hint" type="text" placeholder="接口拿不到昵称时可手动填写" />
            </label>
            <label>
              <span>视频号后台 Cookie</span>
              <textarea
                id="session-cookie"
                rows="4"
                placeholder="从视频号后台请求头里复制完整 Cookie。首版 Python 迁移版用它来替代扩展里的浏览器会话。"
              ></textarea>
            </label>
            <div class="form-actions">
              <button type="submit" class="primary">保存设置</button>
              <span id="save-status" class="muted"></span>
            </div>
          </form>
        </section>

        <section class="panel selection-panel" id="selection-panel" hidden>
          <div class="panel-title-row">
            <h2>采集前确认</h2>
            <span id="selection-account" class="badge">-</span>
          </div>
          <p id="selection-status" class="muted">先读取近期视频，再选择本次要采集的内容。</p>
          <div class="selection-toolbar">
            <label class="check-inline">
              <input id="select-all-videos" type="checkbox" />
              <span>全选</span>
            </label>
            <span id="selection-summary" class="muted">已选择 0 / 0 条视频</span>
          </div>
          <div id="video-selection-list" class="video-selection-list"></div>
          <div class="form-actions">
            <button id="confirm-selection" class="primary">确认并开始后台采集</button>
            <button id="cancel-selection" type="button" class="secondary">取消</button>
          </div>
        </section>

        <section class="panel chart-panel">
          <div class="panel-title-row chart-title-row">
            <div class="chart-heading">
              <h2 id="chart-title">趋势</h2>
              <p id="chart-meta" class="muted"></p>
            </div>
            <div class="chart-controls">
              <label>
                <span>汇总周期</span>
                <input id="window-minutes" type="number" min="1" value="5" />
              </label>
              <label>
                <span>视频</span>
                <select id="video-select"></select>
              </label>
            </div>
          </div>
          <div id="chart-list" class="chart-list"></div>
        </section>

        <section class="panel summary-panel">
          <div class="panel-title-row">
            <h2>周期汇总</h2>
            <span id="summary-meta" class="muted"></span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>视频</th>
                  <th>播放</th>
                  <th>点赞</th>
                  <th>评论</th>
                  <th>分享</th>
                  <th>窗口起点</th>
                  <th>窗口终点</th>
                </tr>
              </thead>
              <tbody id="summary-body"></tbody>
            </table>
          </div>
        </section>

        <section class="panel recent-panel">
          <div class="panel-title-row">
            <h2>最近采集快照</h2>
            <span class="muted">展示最近 10 条</span>
          </div>
          <div id="recent-snapshots" class="recent-snapshots"></div>
        </section>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
